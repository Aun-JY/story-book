<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디노의 이야기</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Jua', sans-serif;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: #000;
    }

    .slide-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .page-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity .45s ease;
    }
    .page-img.active { opacity: 1; }

    .zone {
      position: fixed;
      top: 0;
      bottom: 0;
      z-index: 10;
      cursor: pointer;
    }
    .zone.prev { left: 0;   width: 25%; }
    .zone.next { right: 0;  width: 25%; }
    .zone.mid  { left: 25%; width: 50%; cursor: default; }

    /* 시작 오버레이 */
    .start-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }
    .start-overlay.hide {
      animation: fadeOut .4s ease forwards;
      pointer-events: none;
    }
    @keyframes fadeOut { to { opacity: 0; } }

    .start-title {
      color: #ffe87a;
      font-size: clamp(2rem, 5vw, 3.5rem);
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    }
    .start-hint {
      color: rgba(255,255,255,0.8);
      font-size: clamp(1.2rem, 2.5vw, 2rem);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: .4; }
      50%      { opacity: 1; }
    }

    /* 하단 UI 패널 */
    .ui-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 20px 24px 28px;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s ease;
    }
    .ui-panel.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .dots { display: flex; gap: 9px; }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      cursor: pointer;
      transition: background .3s, transform .3s;
    }
    .dot.active { background: #fff; transform: scale(1.5); }

    .bottom-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn-ui {
      color: #fff;
      font-family: 'Jua', sans-serif;
      font-size: 1.2rem;
      text-decoration: none;
      background: rgba(0,0,0,0.38);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 999px;
      padding: 10px 24px;
      backdrop-filter: blur(8px);
      transition: background .2s;
      white-space: nowrap;
      cursor: pointer;
    }
    .btn-ui:hover { background: rgba(0,0,0,0.6); }

    .page-counter {
      color: #fff;
      font-size: .95rem;
      background: rgba(0,0,0,0.28);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 8px 18px;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>

<!-- 배경음악 -->
<audio id="bgm" src="DINO.mp3" loop preload="auto"></audio>

<div class="slide-container" id="stage"></div>

<div class="zone prev" onclick="move(-1)"></div>
<div class="zone mid"  onclick="toggleUI()"></div>
<div class="zone next" onclick="move(1)"></div>

<div class="ui-panel" id="ui-panel">
  <div class="dots" id="dots"></div>
  <div class="bottom-row">
    <a class="btn-ui" href="../index.html">← 처음으로</a>
    <span class="page-counter" id="counter"></span>
    <button class="btn-ui" id="btn-mute" onclick="toggleMute()">🔊</button>
    <button class="btn-ui" id="btn-fs" onclick="toggleFullscreen()">⛶ 전체화면</button>
  </div>
</div>

<!-- 시작 오버레이 -->
<div class="start-overlay" id="start-overlay" onclick="startViewer()">
  <div class="start-title">🦕 디노의 이야기</div>
  <div class="start-hint">화면을 눌러 시작하기 ✨</div>
</div>

<script>
  let pages = [];
  let cur = 0;
  let hideTimer = null;
  let wakeLock = null;

  const stage  = document.getElementById('stage');
  const dotsEl = document.getElementById('dots');
  const counter= document.getElementById('counter');
  const panel  = document.getElementById('ui-panel');
  const btnFs  = document.getElementById('btn-fs');
  const btnMute= document.getElementById('btn-mute');
  const bgm    = document.getElementById('bgm');

  /* 화면 꺼짐 방지 */
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch (e) { /* 미지원 환경 무시 */ }
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  /* 전체화면 */
  function requestFs() {
    const el = document.documentElement;
    if (el.requestFullscreen)            el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }
  function exitFs() {
    if (document.exitFullscreen)            document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
  function isFs() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement);
  }
  function toggleFullscreen() {
    isFs() ? exitFs() : requestFs();
  }
  document.addEventListener('fullscreenchange',       updateFsBtn);
  document.addEventListener('webkitfullscreenchange', updateFsBtn);
  function updateFsBtn() {
    btnFs.textContent = isFs() ? '✕ 전체화면 끄기' : '⛶ 전체화면';
  }

  /* 음소거 토글 */
  function toggleMute() {
    bgm.muted = !bgm.muted;
    btnMute.textContent = bgm.muted ? '🔇' : '🔊';
  }

  /* 시작 오버레이 클릭 */
  function startViewer() {
    requestFs();
    requestWakeLock();
    bgm.play();
    const overlay = document.getElementById('start-overlay');
    overlay.classList.add('hide');
    setTimeout(() => overlay.remove(), 400);
  }

  /* 이미지 감지 */
  function detectPages(index, done) {
    const img = new Image();
    img.onload  = () => { pages.push(index + '.png'); detectPages(index + 1, done); };
    img.onerror = () => done();
    img.src = index + '.png?t=' + Date.now();
  }

  function buildViewer() {
    stage.innerHTML = '';
    dotsEl.innerHTML = '';
    cur = 0;
    pages.forEach((src, i) => {
      const img = document.createElement('img');
      img.className = 'page-img' + (i === 0 ? ' active' : '');
      img.src = src;
      img.alt = `${i + 1}페이지`;
      stage.appendChild(img);

      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.onclick = () => goTo(i);
      dotsEl.appendChild(dot);
    });
    counter.textContent = `1 / ${pages.length}`;
  }

  function goTo(n) {
    document.querySelectorAll('.page-img')[cur].classList.remove('active');
    document.querySelectorAll('.dot')[cur].classList.remove('active');
    cur = n;
    document.querySelectorAll('.page-img')[cur].classList.add('active');
    document.querySelectorAll('.dot')[cur].classList.add('active');
    counter.textContent = `${cur + 1} / ${pages.length}`;
  }

  function move(dir) {
    const next = cur + dir;
    if (next >= 0 && next < pages.length) goTo(next);
  }

  function toggleUI() {
    clearTimeout(hideTimer);
    if (panel.classList.contains('visible')) {
      panel.classList.remove('visible');
    } else {
      panel.classList.add('visible');
      hideTimer = setTimeout(() => panel.classList.remove('visible'), 3000);
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') move(1);
    if (e.key === 'ArrowLeft')  move(-1);
    if (e.key === 'f' || e.key === 'F') toggleFullscreen();
    if (e.key === 'm' || e.key === 'M') toggleMute();
    if (e.key === 'Enter' || e.key === ' ') startViewer();
  });

  detectPages(1, buildViewer);
</script>
</body>
</html>
